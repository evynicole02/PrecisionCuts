{% extends "base.html" %}
{% block content %}

<h2 class="booking-title">Schedule Your Next Cut</h2>

<form action="/book" method="POST" class="booking-form">
    <label>Your Name</label>
    <input type="text" name="name" required>

    <label>Your Phone Number</label>
    <input type="text" name="phone" required>

    <label>Select a Time</label>
    <select name="time" id="time_select" required>
        <option value="" disabled selected>Select an available time</option>

        {% for slot in available %}
            <option 
                value="{{ slot.date }}T{{ slot.time }}"
                data-id="{{ slot.id }}"
            >
                {{ slot.date }} — {{ slot.time }}
            </option>
        {% endfor %}
    </select>

    <!-- Hidden field that stores the slot ID -->
    <input type="hidden" name="slot_id" id="slot_id">

    <button type="submit">Confirm Appointment</button>
</form>

<script>
    // When user selects a time, store the slot ID in the hidden input
    document.getElementById("time_select").addEventListener("change", function() {
        const selected = this.options[this.selectedIndex];
        const slotId = selected.getAttribute("data-id");
        document.getElementById("slot_id").value = slotId;
    });
</script>

{% endblock %}
